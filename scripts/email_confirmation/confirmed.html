<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email confirmed · KRAB</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; background: #111;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .wrap { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .card { background: #1a1a1a; border-radius: 16px; max-width: 420px; width: 100%;
            padding: 40px 32px; text-align: center; box-sizing: border-box; }
        .logo { width: 80px; height: 80px; border-radius: 16px; }
        .brand { font-size: 28px; font-weight: 900; letter-spacing: 4px; color: #fff; margin-top: 12px; }
        h1 { color: #fff; font-size: 22px; margin: 24px 0 12px; }
        p { color: #aaa; font-size: 15px; line-height: 1.6; margin: 0; }
        .check { color: #3ecf8e; font-size: 44px; margin-top: 8px; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <img class="logo" src="https://raw.githubusercontent.com/zatomos/KRAB/main/logo/krab_logo.png" alt="KRAB" />
        <div class="brand">KRAB</div>
        <div class="check">&#10003;</div>
        <h1>Email confirmed</h1>
        <p>Your email address is verified. You can now return to the KRAB app and log in.</p>
    </div>
</div>
</body>
</html>
