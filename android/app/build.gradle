plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
}

// Release signing.
def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
def hasReleaseKeystore = keystorePropertiesFile.exists()
if (hasReleaseKeystore) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "fr.zatomos.krab"
    compileSdk = 37
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_21
        targetCompatibility = JavaVersion.VERSION_21
        coreLibraryDesugaringEnabled true
    }

    defaultConfig {
        applicationId = "fr.zatomos.krab"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        if (hasReleaseKeystore) {
            release {
                keyAlias = keystoreProperties["keyAlias"]
                keyPassword = keystoreProperties["keyPassword"]
                storeFile = keystoreProperties["storeFile"] ? file(keystoreProperties["storeFile"]) : null
                storePassword = keystoreProperties["storePassword"]
                enableV1Signing = true
                enableV2Signing = true
                enableV3Signing = true
            }
        }
    }

    buildTypes {
        release {
            if (hasReleaseKeystore) {
                signingConfig = signingConfigs.release
            } else {
                // No keystore: fall back to debug keys
                println("=".multiply(78))
                println("WARNING: no android/key.properties, signing release with DEBUG keys.")
                println("This APK is for local use only. DO NOT PUBLISH IT.")
                println("See android/key.properties.example.")
                println("=".multiply(78))
                signingConfig = signingConfigs.debug
            }
        }
    }
    buildFeatures {
        viewBinding true
    }

    // Ship multiple variants of the app
    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            output.versionCodeOverride = flutter.versionCode
        }
    }
}

kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_21
    }
}


flutter {
    source = "../.."
}

configurations.configureEach {
    exclude group: 'com.google.crypto.tink', module: 'tink'
}

dependencies {
    // Firebase
    implementation platform('com.google.firebase:firebase-bom:34.16.0')
    implementation 'com.google.firebase:firebase-messaging'

    // Kotlin coroutines
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.10.1"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:1.10.1"
    implementation "androidx.work:work-runtime-ktx:2.9.1"
    implementation "androidx.exifinterface:exifinterface:1.3.7"

    implementation 'com.google.android.material:material:1.13.0'

    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'
}
